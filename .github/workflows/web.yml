name: Web

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      has-changes: ${{ steps.check.outputs.has-changes }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        uses: ky1ejs/check-diff-paths-action@v0.3.0
        with:
          paths: "^web\\/.*"
          github-token: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: check-changes
    if: needs.check-changes.outputs.has-changes == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run codegen
      - run: npx tsc --noEmit
      - run: npm test
      - run: npm run build
