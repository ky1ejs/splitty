schema:
  - graph/*.graphqls

exec:
  filename: graph/generated.go
  package: graph

model:
  filename: graph/model/models_gen.go
  package: model

resolver:
  layout: follow-schema
  dir: graph
  package: graph
  filename_template: "{name}.resolvers.go"

models:
  ID:
    model:
      - github.com/99designs/gqlgen/graphql.ID
  Group:
    model:
      - github.com/kylejs/splitty/backend/graph/model.Group
    fields:
      members:
        resolver: true
      transactions:
        resolver: true
      createdBy:
        resolver: true
  Transaction:
    model:
      - github.com/kylejs/splitty/backend/graph/model.Transaction
    fields:
      group:
        resolver: true
      paidBy:
        resolver: true
      splitBetween:
        resolver: true
